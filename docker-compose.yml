services:
  glm2api:
    image: glm2api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glm2api
    restart: unless-stopped
    # network_mode: host
    ports:
      - "${PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./token.txt:/app/token.txt
    dns:
      - 223.5.5.5
      - 119.29.29.29
      - 8.8.8.8
    dns_opt:
      - ndots:1
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
